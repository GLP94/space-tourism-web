<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&family=Bellefair&family=Barlow:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="stylesheet.css">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
    <title>Frontend Mentor | Space tourism website</title>
    <script src="script.js" defer></script>
</head>

<body class="background-des">
    <header class="flex">
        <div>
            <img src="./assets/shared/logo.svg" class="logo" alt="Logo"></img>
        </div>
        <button class="hamburger" aria-expanded="false">
            <img src="./assets/shared/icon-hamburger.svg">
        </button>

        <nav class="menu flex flow hidden underline">
            <button class="close"><img src="./assets/shared/icon-close.svg"><span class="sr-only">Menu</span></button>
            <a href="./index.html" aria-selected="false" class="ff-sans-cond uppercase text-white letter-spacing-2">
                <span aria-hidden="true">00</span>
                Home
            </a>
            <a href="./destination.html" aria-selected="true" class="ff-sans-cond uppercase text-white letter-spacing-2">
                <span aria-hidden="true">01</span>
                Destination
            </a>
            <a href="#" aria-selected="false" class="ff-sans-cond uppercase text-white letter-spacing-2">
                <span aria-hidden="true">02</span>
                Crew
            </a>
            <a href="#" aria-selected="false" class="ff-sans-cond uppercase text-white letter-spacing-2">
                <span aria-hidden="true">03</span>
                Technology
            </a>
        </nav>
    </header>

    <span class="text-white numbered-title-tab block"><span aria-hidden="true">01</span> Pick your destination</span>

    <main class="container-grid" style="color:red">
        <div class="imageCont">
            
            <div>
                <img id="planetImage">
            </div>
        </div>
        
        <div class="flow" style="--flow-space: 2rem">
            <div>
                <ul class="tab flex underline">
                    <li aria-selected="true"><button class="ff-sans-cond uppercase letter-spacing-2 fs-500 text-white" value="0">Moon</button></li>
                    <li aria-selected="false"><button class="ff-sans-cond uppercase letter-spacing-2 fs-500 text-white" value="1">Mars</button></li>
                    <li aria-selected="false"><button class="ff-sans-cond uppercase letter-spacing-2 fs-500 text-white" value="2">Europa</button></li>
                    <li aria-selected="false"><button class="ff-sans-cond uppercase letter-spacing-2 fs-500 text-white" value="3">Titan</button></li>
                </ul>
            </div>
            <h1 id="planetName" class="fs-800 text-white uppercase ff-serif letter-spacing-3"></h1>
            <p id="planetDescription" class="text-accent"></p>
            <div class="statistics flex">
                <p class="uppercase text-accent">Avg. Distance <span id="planetDistance" class="block text-white"></span></p>
                <p class="uppercase text-accent">Est. Travel Time <span id="planetTravel" class="block text-white"></span></p>
            </div>
        </div>
    </main>
</body>

</html>
