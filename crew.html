<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&family=Bellefair&family=Barlow:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="stylesheet.css">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
    <title>Frontend Mentor | Space tourism website</title>
    <script src="script.js" defer></script>
</head>

<body class="background-des">
    <header class="flex">
        <div>
            <a href="index.html"><img src="./assets/shared/logo.svg" class="logo" alt="Logo"></img></a>
        </div>
        <button class="hamburger" aria-expanded="false">
            <img src="./assets/shared/icon-hamburger.svg">
        </button>

        <nav class="menu flex flow hidden underline">
            <button class="close"><img src="./assets/shared/icon-close.svg"><span class="sr-only">Menu</span></button>
            <a href="./index.html" aria-selected="false" class="ff-sans-cond uppercase text-white letter-spacing-2">
                <span aria-hidden="true">00</span>
                Home
            </a>
            <a href="./destination.html" aria-selected="false"
                class="ff-sans-cond uppercase text-white letter-spacing-2">
                <span aria-hidden="true">01</span>
                Destination
            </a>
            <a href="./crew.html"" aria-selected="true" class="ff-sans-cond uppercase text-white letter-spacing-2">
                <span aria-hidden="true">02</span>
                Crew
            </a>
            <a href="#" aria-selected="false" class="ff-sans-cond uppercase text-white letter-spacing-2">
                <span aria-hidden="true">03</span>
                Technology
            </a>
        </nav>
    </header>



    <main class="container-grid grid-crew flow">

        <h1 class="numbered-title text-white" style="font-weight: 400;"><span aria-hidden="true">02</span> Meet your Crew</h1>

        <img id="crewImage">

        <div class="tab-crew flex">
            <button aria-selected="true" value="0"></button>
            <button aria-selected="false" value="1"></button>
            <button aria-selected="false" value="2"></button>
            <button aria-selected="false"  value="3"></button>
        </div>

        <article class="flow">
            <p id="crewRole" class="uppercase text-white fs-400"></p>
            <h2 id="crewName" class="uppercase text-white ff-serif letter-spacing-3"></h2>
            <p id="crewBio" class="text-accent"></p>
        </article>
    </main>
</body>

</html>
