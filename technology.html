<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&family=Bellefair&family=Barlow:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="stylesheet.css">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
    <title>Frontend Mentor | Space tourism website</title>
    <script src="script.js" defer></script>
</head>

<body class="background-tech">
    <header class="flex">
        <div>
            <a href="index.html"><img src="./assets/shared/logo.svg" class="logo" alt="Logo"></img></a>
        </div>
        <button class="hamburger" aria-expanded="false">
            <img src="./assets/shared/icon-hamburger.svg">
        </button>

        <nav class="menu flex flow hidden underline">
            <button class="close"><img src="./assets/shared/icon-close.svg"><span class="sr-only">Menu</span></button>
            <a href="./index.html" aria-selected="false" class="ff-sans-cond uppercase text-white letter-spacing-2">
                <span aria-hidden="true">00</span>
                Home
            </a>
            <a href="./destination.html" aria-selected="false"
                class="ff-sans-cond uppercase text-white letter-spacing-2">
                <span aria-hidden="true">01</span>
                Destination
            </a>
            <a href="./crew.html" aria-selected="false" class="ff-sans-cond uppercase text-white letter-spacing-2">
                <span aria-hidden="true">02</span>
                Crew
            </a>
            <a href="./technology.html" aria-selected="true" class="ff-sans-cond uppercase text-white letter-spacing-2">
                <span aria-hidden="true">03</span>
                Technology
            </a>
        </nav>
    </header>

    <main class="container-grid grid-tech">
        <h1 class="numbered-title text-white" style="font-weight: 400;"><span aria-hidden="true">03</span> Space launch 101</h1>

        <img id="techImage">

        <article class="flex">
            <nav class="tab-tech">
                <button value="0" aria-selected="true" class="ff-serif fs-400">1</button>
                <button value="1" aria-selected="false" class="ff-serif fs-400">2</button>
                <button value="2" aria-selected="false" class="ff-serif fs-400">3</button>
            </nav>

            <div class="flow">
                <p class="uppercase text-accent ff-serif">The Terminology...</p>
                <h2 id="techName" class="fs-700 text-white uppercase ff-serif letter-spacing-3"></h2>
                <p id="techDescription" class="text-accent ff-serif"></p>
            </div>
        </article>
    </main>
</body>

</html>
